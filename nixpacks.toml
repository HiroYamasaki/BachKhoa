[phases.setup]
aptPkgs = ["libicu-dev"]

[phases.install]
cmds = [
    "docker-php-ext-install intl || true",
    "composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-req=ext-intl"
]

[phases.build]
cmds = [
    "cp .env.example .env || true",
    "php artisan key:generate --force || true",
    "php artisan event:cache || true",
    "php artisan route:cache || true",
    "php artisan view:cache || true"
]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan db:seed --class=RolePermissionSeeder --force && caddy run --config /Caddyfile --adapter caddyfile"
